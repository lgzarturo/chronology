<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0f172a"/>
  <!-- Connection lines -->
  <line x1="16" y1="7" x2="7"  y2="24" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="25" y2="24" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="7"  y1="24" x2="25" y2="24" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <!-- Nodes: amber top (foundation), blue bottom (web) -->
  <circle cx="16" cy="7"  r="4.5" fill="#f59e0b"/>
  <circle cx="7"  cy="24" r="3.5" fill="#3b82f6"/>
  <circle cx="25" cy="24" r="3.5" fill="#3b82f6"/>
</svg>
